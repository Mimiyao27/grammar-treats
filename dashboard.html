<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>

<body>
    <h1>Dashboard</h1>
    <p>Welcome to your dashboard, <span id="dash-firstname"></span> <span id="dash-lastname"></span>!</p>
    
    <div>

        <p><strong>Email Address:</strong> <span id="dash-email"></span></p>
    </div>

    <button id="logout-btn">Logout</button>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
