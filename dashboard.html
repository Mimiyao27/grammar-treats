<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Grammar Treats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo" id="logo">
                <span class="logo-grammar">grammar</span>
                <span class="logo-treats">TREATS</span>
            </a>
            
            <button class="hamburger-menu" id="hamburger-menu" aria-label="Toggle Navigation">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-hamburger">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-close">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <nav class="nav-pill" id="main-nav">
                <a href="#" class="nav-link" id="nav-about">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    about us
                </a>
                <a href="#" class="nav-link" id="nav-services">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15h14v2H5zm0-4h14v2H5zm0-4h14v2H5z"/></svg>
                    services
                </a>
                <a href="#" class="nav-link nav-signup" id="logout-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                    log out
                </a>
            </nav>
        </div>
    </header>

    <!-- Dashboard Hero -->
    <main class="dashboard-hero">
        <!-- Top Left Badge -->
        <div class="user-badge">
            <span class="badge-welcome">WELCOME!</span>
            <span class="badge-username" id="dash-username"></span>
        </div>
        
        <!-- Center Logo -->
        <div class="dash-logo">
            <span class="logo-grammar">grammar</span>
            <div class="logo-treats-wrapper">
                <span class="logo-abcde">
                    <span style="color:var(--accent-red)">A</span><span style="color:var(--accent-green)">B</span><span style="color:var(--accent-orange)">C</span><span style="color:var(--accent-cyan)">D</span><span style="color:var(--accent-red)">E</span>
                </span>
                <span class="logo-treats">TREATS</span>
            </div>
        </div>

        <!-- Center Menu -->
        <div class="dash-menu">
            <button class="btn-dash btn-start" id="dash-btn-start">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <span>Start Game</span>
            </button>
            <div class="dash-menu-row">
                <button class="btn-dash btn-leaderboard">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11V3H8v6H2v12h20V11h-6zM10 5h4v14h-4V5zM4 11h4v8H4v-8zm16 8h-4v-6h4v6z"/></svg>
                    <span>Leaderboard</span>
                </button>
                <button class="btn-dash btn-howtoplay">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <text x="11" y="15" font-family="sans-serif" font-size="10" font-weight="bold" fill="currentColor" stroke="none">?</text>
                    </svg>
                    <span>How to Play</span>
                </button>
            </div>
        </div>

        <!-- Settings -->
        <div class="settings-wrapper">
            <button class="btn-settings" id="dash-settings-btn" title="Settings" aria-label="Settings">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>
            <div class="settings-popover" id="settings-popover">
                <div class="settings-item">
                    <div class="settings-info">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <span>Sound</span>
                    </div>
                    <div class="settings-control">
                        <input type="range" class="settings-slider" min="0" max="100" value="50">
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-info">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        <span>BGM</span>
                    </div>
                    <div class="settings-control">
                        <input type="range" class="settings-slider" min="0" max="100" value="50">
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-info">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9.37,5.51C9.19,6.15,9.1,6.82,9.1,7.5c0,4.08,3.32,7.4,7.4,7.4c0.68,0,1.35-0.09,1.99-0.27C17.45,17.19,14.93,19,12,19 c-3.86,0-7-3.14-7-7C5,9.07,6.81,6.55,9.37,5.51z M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36 c-0.98,1.37-2.58,2.26-4.4,2.26c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z"/></svg>
                        <span>Mode</span>
                    </div>
                    <div class="settings-control" style="justify-content: flex-start; padding-left: 10px;">
                        <label class="settings-toggle">
                            <input type="checkbox">
                            <span class="toggle-slider-round"></span>
                            <span class="toggle-icon toggle-icon-moon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--blue-dark)"><path d="M9.37,5.51C9.19,6.15,9.1,6.82,9.1,7.5c0,4.08,3.32,7.4,7.4,7.4c0.68,0,1.35-0.09,1.99-0.27C17.45,17.19,14.93,19,12,19 c-3.86,0-7-3.14-7-7C5,9.07,6.81,6.55,9.37,5.51z M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36 c-0.98,1.37-2.58,2.26-4.4,2.26c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z"/></svg>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay"></div>

    <!-- Logout Modal -->
    <div class="modal modal-play" id="modal-logout" style="max-width: 400px; padding: 40px;">
        <div class="modal-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="var(--accent-red)">
                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
            </svg>
        </div>
        <h2 class="modal-title" style="color: var(--accent-red); font-size: 1.5rem; margin-bottom: 24px;">Are you sure you want to log out?</h2>
        <div class="modal-actions" style="margin-top: 10px;">
            <button class="btn-primary" id="btn-logout-yes" style="background: var(--accent-red); box-shadow: 0 4px 15px rgba(231,76,60,0.3); width: 120px;">Yes</button>
            <button class="btn-outline" id="btn-logout-no" style="width: 120px;">No</button>
        </div>
    </div>

    <!-- Game Modal -->
    <div class="modal modal-game" id="modal-game" style="max-width: 500px; padding: 30px;">
        <button class="modal-close" id="close-game" aria-label="Close Game">&times;</button>
        <div class="game-timer-text" id="game-timer-text">10s</div>
        <div class="game-header">
            <span class="game-question-num" id="game-q-num">Question 1 of 5</span>
        </div>
        <h2 class="game-question" id="game-question-text">Loading question...</h2>
        <div class="game-options" id="game-options">
            <!-- Options injected here -->
        </div>
    </div>

    <!-- Results Modal -->
    <div class="modal modal-results" id="modal-results" style="max-width: 600px; padding: 30px;">
        <div class="results-header">
            <h2 class="results-title">Great Job! 🌟</h2>
            <div class="results-score"><span id="results-score-value">0</span> <span style="font-size: 1.25rem; font-weight: 800; color: var(--text-muted)">/ 5 Treats Earned</span></div>
        </div>
        <div class="results-list" id="results-list">
            <!-- Explanations injected here -->
        </div>
        <div class="modal-actions" style="margin-top: 24px;">
            <button class="btn-primary" id="btn-back-dashboard" style="width: 100%;">Back to Dashboard</button>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
