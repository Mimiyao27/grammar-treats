<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Grammar Treats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo" id="logo">
                <span class="logo-grammar">grammar</span>
                <span class="logo-treats">TREATS</span>
            </a>
            
            <button class="hamburger-menu" id="hamburger-menu" aria-label="Toggle Navigation">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <nav class="nav-pill" id="main-nav">
                <a href="#" class="nav-link" id="nav-about">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    about us
                </a>
                <a href="#" class="nav-link" id="nav-services">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15h14v2H5zm0-4h14v2H5zm0-4h14v2H5z"/></svg>
                    services
                </a>
                <a href="#" class="nav-link nav-signup" id="logout-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                    log out
                </a>
            </nav>
        </div>
    </header>

    <main style="padding: 120px 40px 100px; max-width: 1200px; margin: 0 auto; min-height: 100vh;">
        <h1 style="font-family: var(--font-display); color: var(--blue); margin-bottom: 20px;">Dashboard</h1>
        <p style="font-size: 1.1rem; color: var(--text-muted); margin-bottom: 30px;">
            Welcome to your dashboard, <span id="dash-firstname" style="font-weight: 700; color: var(--text-dark);"></span> <span id="dash-lastname" style="font-weight: 700; color: var(--text-dark);"></span>!
        </p>
        
        <div style="background: var(--white); border-radius: var(--radius-md); padding: 30px; box-shadow: var(--shadow-sm); border: 2px solid var(--border-light); display: inline-block; min-width: 300px;">
            <p style="margin-bottom: 12px; font-size: 1.05rem;"><strong style="color: var(--blue); margin-right: 8px;">Username:</strong> <span id="dash-username"></span></p>
            <p style="font-size: 1.05rem;"><strong style="color: var(--blue); margin-right: 8px;">Email Address:</strong> <span id="dash-email"></span></p>
        </div>
    </main>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
